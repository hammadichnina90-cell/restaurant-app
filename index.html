<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مطعمي</title>
<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

h1{
background:#ff6600;
color:white;
padding:15px;
}

.menu{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.item{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#ff6600;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

#total{
margin-top:30px;
font-size:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>قائمة الطعام</h1>

<div class="menu">

<div class="item">
<h3>بيتزا</h3>
<p>السعر: 10 د.ت</p>
<button onclick="add(10)">أضف للطلب</button>
</div>

<div class="item">
<h3>برغر</h3>
<p>السعر: 7 د.ت</p>
<button onclick="add(7)">أضف للطلب</button>
</div>

<div class="item">
<h3>سلطة</h3>
<p>السعر: 5 د.ت</p>
<button onclick="add(5)">أضف للطلب</button>
</div>

</div>

<div id="total">
المجموع: 0 د.ت
</div>

<script>

let total = 0;

function add(price){
total = total + price;
document.getElementById("total").innerText = "المجموع: " + total + " د.ت";
}

</script>

</body>
</html>
